name: kafka-event-processing-lab

services:
  kafka:
    image: apache/kafka:latest
    hostname: kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_NODE_ID: "1"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: "6"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
    networks:
      - event-net

  kafka-init:
    image: apache/kafka:latest
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -ec
      - >
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic events.page_views --partitions 12 --replication-factor 1 &&
        current_page_views=$$(/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic events.page_views | sed -n 's/.*PartitionCount: \([0-9][0-9]*\).*/\1/p' | head -n 1) &&
        if [ "$${current_page_views:-0}" -lt 12 ]; then
          /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --alter --if-exists --topic events.page_views --partitions 12;
        fi &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic events.clicks --partitions 6 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic events.purchases --partitions 3 --replication-factor 1 &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic events.page_views &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic events.clicks &&
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --describe --topic events.purchases
    restart: "no"
    networks:
      - event-net

  postgres:
    image: postgres:16
    command:
      - postgres
      - -c
      - wal_level=replica
      - -c
      - max_wal_senders=10
      - -c
      - max_replication_slots=10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: eventsdb
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventsdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - event-net

  postgres-replication-setup:
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: postgres
    command:
      - /bin/sh
      - -ec
      - |
        hba_file=/var/lib/postgresql/data/pg_hba.conf
        if ! grep -q "host replication replicator all scram-sha-256" "$$hba_file"; then
          echo "host replication replicator all scram-sha-256" >> "$$hba_file"
        fi
        if ! psql -h postgres -U postgres -d eventsdb -tAc "SELECT 1 FROM pg_roles WHERE rolname='replicator'" | grep -q 1; then
          psql -h postgres -U postgres -d eventsdb -c "CREATE ROLE replicator WITH REPLICATION LOGIN PASSWORD 'replicator';"
        fi
        psql -h postgres -U postgres -d eventsdb -c "SELECT pg_reload_conf();"
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: "no"
    networks:
      - event-net

  postgres-replica-1:
    image: postgres:16
    depends_on:
      postgres-replication-setup:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ec
      - |
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          rm -rf /var/lib/postgresql/data/*
          export PGPASSWORD=replicator
          until pg_basebackup --host=postgres --port=5432 --username=replicator --pgdata=/var/lib/postgresql/data --wal-method=stream --write-recovery-conf --progress; do
            echo "Waiting for primary to accept replication connections..."
            sleep 2
          done
          chmod 700 /var/lib/postgresql/data
        fi
        chown -R postgres:postgres /var/lib/postgresql/data
        exec gosu postgres postgres -c hot_standby=on
    ports:
      - "5433:5432"
    volumes:
      - pg_replica_1_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventsdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - event-net

  postgres-replica-2:
    image: postgres:16
    depends_on:
      postgres-replication-setup:
        condition: service_completed_successfully
    command:
      - /bin/sh
      - -ec
      - |
        if [ ! -s /var/lib/postgresql/data/PG_VERSION ]; then
          rm -rf /var/lib/postgresql/data/*
          export PGPASSWORD=replicator
          until pg_basebackup --host=postgres --port=5432 --username=replicator --pgdata=/var/lib/postgresql/data --wal-method=stream --write-recovery-conf --progress; do
            echo "Waiting for primary to accept replication connections..."
            sleep 2
          done
          chmod 700 /var/lib/postgresql/data
        fi
        chown -R postgres:postgres /var/lib/postgresql/data
        exec gosu postgres postgres -c hot_standby=on
    ports:
      - "5434:5432"
    volumes:
      - pg_replica_2_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d eventsdb"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped
    networks:
      - event-net

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_READONLY: "false"
    networks:
      - event-net

  generator:
    build:
      context: ./generator
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BROKERS: kafka:9092
      EVENTS_PER_SECOND: "10000"
      PAGE_VIEWS_PER_SECOND: "7000"
      CLICKS_PER_SECOND: "2900"
      PURCHASES_PER_SECOND: "100"
    restart: unless-stopped
    networks:
      - event-net

  backend-1:
    build:
      context: ./backend
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    environment:
      PORT: "3001"
      INSTANCE_ID: backend-1
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventsdb
      DATABASE_READ_URLS: postgresql://postgres:postgres@postgres-replica-1:5432/eventsdb,postgresql://postgres:postgres@postgres-replica-2:5432/eventsdb
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPICS: events.page_views,events.clicks,events.purchases
      KAFKA_GROUP_ID: analytics-consumer
      KAFKA_CLIENT_ID: analytics-consumer-client
      KAFKA_POSTFIX_ID: ""
      KAFKA_PARTITIONS_CONSUMED_CONCURRENCY: "6"
      BATCH_SIZE: "2000"
      FLUSH_INTERVAL_MS: "200"
    ports:
      - "3001:3001"
    restart: unless-stopped
    networks:
      - event-net

  backend-2:
    build:
      context: ./backend
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      postgres-replica-1:
        condition: service_healthy
      postgres-replica-2:
        condition: service_healthy
    environment:
      PORT: "3002"
      INSTANCE_ID: backend-2
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/eventsdb
      DATABASE_READ_URLS: postgresql://postgres:postgres@postgres-replica-1:5432/eventsdb,postgresql://postgres:postgres@postgres-replica-2:5432/eventsdb
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPICS: events.page_views,events.clicks,events.purchases
      KAFKA_GROUP_ID: analytics-consumer
      KAFKA_CLIENT_ID: analytics-consumer-client
      KAFKA_POSTFIX_ID: ""
      KAFKA_PARTITIONS_CONSUMED_CONCURRENCY: "6"
      BATCH_SIZE: "2000"
      FLUSH_INTERVAL_MS: "200"
    ports:
      - "3002:3002"
    restart: unless-stopped
    networks:
      - event-net

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend-1:
        condition: service_started
      backend-2:
        condition: service_started
    environment:
      VITE_API_BASE_URL: http://localhost:3001/api
      VITE_API_BASE_URL_FALLBACK: http://localhost:3002/api
      PORT: "5173"
    ports:
      - "5173:5173"
    restart: unless-stopped
    networks:
      - event-net

volumes:
  pg_data:
  pg_replica_1_data:
  pg_replica_2_data:

networks:
  event-net:
    driver: bridge
